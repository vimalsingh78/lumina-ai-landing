<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina AI — Master AI & Data Science</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS CUSTOM PROPERTIES ── */
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --border: #1e293b;
      --primary: #6366f1;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; overflow-x: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── UTILITY ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary-light);
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .section-subtitle {
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.7;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor-dot, #cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #cursor-dot {
      width: 8px; height: 8px;
      background: var(--primary);
    }
    #cursor-ring {
      width: 32px; height: 32px;
      border: 1.5px solid rgba(99,102,241,0.5);
      transition: width 0.2s, height 0.2s, background 0.2s, opacity 0.2s;
    }
    body.cursor-hover #cursor-dot { opacity: 0; }
    body.cursor-hover #cursor-ring {
      width: 48px; height: 48px;
      background: rgba(99,102,241,0.1);
    }
    @media (hover: none) {
      #cursor-dot, #cursor-ring { display: none; }
      body { cursor: auto; }
    }

    /* ── NAVIGATION ── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 0;
      transition: background 0.4s, backdrop-filter 0.4s, border-color 0.4s, padding 0.4s;
      border-bottom: 1px solid transparent;
    }
    #navbar.scrolled {
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom-color: var(--border);
      padding: 14px 0;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 2px; }
    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
    }
    .nav-logo-dot {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--primary);
      margin-left: 2px;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: var(--font-body);
      border: none;
      cursor: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: #fff;
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 32px rgba(99,102,241,0.5);
    }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary-light);
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <!-- Custom Cursor -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <!-- Navigation -->
  <nav id="navbar">
    <div class="container nav-inner">
      <a href="#" class="nav-logo">
        <span class="nav-logo-text">Lumina</span><span class="nav-logo-dot">AI</span>
      </a>
      <ul class="nav-links">
        <li><a href="#courses">Courses</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#testimonials">Testimonials</a></li>
        <li><a href="#cta">Pricing</a></li>
      </ul>
      <a href="#cta" class="btn btn-primary">Start Learning</a>
    </div>
  </nav>
  <!-- sections go here -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    // ── CUSTOM CURSOR ──
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mouseX = 0, mouseY = 0;
    let ringX = 0, ringY = 0;
    gsap.set([dot, ring], { xPercent: -50, yPercent: -50 });

    let cursorVisible = false;
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      gsap.set(dot, { x: mouseX, y: mouseY });
      if (!cursorVisible) {
        cursorVisible = true;
        gsap.to([dot, ring], { opacity: 1, duration: 0.3 });
      }
    });

    // Ring follows with lerp
    gsap.ticker.add(() => {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      gsap.set(ring, { x: ringX, y: ringY });
    });

    document.addEventListener('mouseover', e => {
      if (e.target.closest('a, button, [data-cursor-hover]')) {
        document.body.classList.add('cursor-hover');
      }
    });
    document.addEventListener('mouseout', e => {
      const hovered = e.target.closest('a, button, [data-cursor-hover]');
      if (hovered && !hovered.contains(e.relatedTarget)) {
        document.body.classList.remove('cursor-hover');
      }
    });

    // ── NAV SCROLL STATE ──
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // Fade-in on load
    gsap.from('#navbar', { y: -20, opacity: 0, duration: 0.8, ease: 'power2.out', delay: 0.2 });

    // JS goes here
  </script>
</body>
</html>
